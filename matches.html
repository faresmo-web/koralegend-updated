<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kora Legend - كورا ليجيند</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="league-styles.css">
</head>
<body>
    <!-- Header -->
    <header class="main-header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon"><img src="logo.png" alt="Kora Legend Logo"></div>
                    <h1 class="logo-text" >KORA LEGEND</h1>
                </div>
                
                <nav class="main-nav">
                    <ul>
                        <li><a href="index" class="nav-link" data-en="Home" data-ar="الرئيسية">Home</a></li>
                        <li><a href="matches" class="nav-link active" data-en="Matches" data-ar="المباريات">Matches</a></li>
                        <li><a href="news" class="nav-link" data-en="News" data-ar="الأخبار">News</a></li>
                        <li><a href="legends" class="nav-link" data-en="Legends" data-ar="الأساطير">Legends</a></li>
                        <li><a href="leagues" class="nav-link" data-en="Leagues" data-ar="البطولات">Leagues</a></li>
                    </ul>
                </nav>
                
                <button class="lang-toggle" id="langToggle">
                    <span class="lang-option" data-lang="en">EN</span>
                    <span class="lang-divider">|</span>
                    <span class="lang-option active" data-lang="ar">AR</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Page Header -->
    <section class="page-header">
        <div class="container">
            <h1 class="page-title" data-en="Football Matches" data-ar="مباريات كرة القدم">Football Matches</h1>
            <p class="page-subtitle" data-en="Stay updated with live scores and schedules" data-ar="ابق على اطلاع بالنتائج المباشرة والجداول">Stay updated with live scores and schedules</p>
        </div>
    </section>

    <!-- Filters -->
    <section class="filters-section">
        <div class="container">
            <div class="filters">
                <select id="leagueFilter" class="filter-select">
                    <option value="all" data-en="All Leagues" data-ar="جميع البطولات">All Leagues</option>
                    <option value="premier" data-en="Premier League" data-ar="الدوري الإنجليزي">Premier League</option>
                    <option value="laliga" data-en="La Liga" data-ar="الدوري الإسباني">La Liga</option>
                    <option value="spl" data-en="Saudi Pro League" data-ar="دوري روشن السعودي">Saudi Pro League</option>
                    <option value="ucl" data-en="Champions League" data-ar="دوري أبطال أوروبا">Champions League</option>
                    <option value="egyptian" data-en="Egyptian League" data-ar="الدوري المصري">Egyptian League</option>
                    <option value="africa" data-en="Africa Cup" data-ar="كأس أفريقيا">Africa Cup</option>
                </select>
                
                <select id="dateFilter" class="filter-select">
                    <option value="today" data-en="Today" data-ar="اليوم">Today</option>
                    <option value="yesterday" data-en="Yesterday" data-ar="أمس">Yesterday</option>
                    <option value="tomorrow" data-en="Tomorrow" data-ar="غداً">Tomorrow</option>
                </select>
            </div>
        </div>
    </section>

    <!-- Matches Display -->
    <section class="matches-display">
        <div class="container">
            <div class="matches-list" id="matchesList">
                <!-- Matches will be populated by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="main-footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">
                    <div class="logo-icon"><img src="logo.png" alt="Kora Legend Logo"></div>
                    <h3 data-en="KORA LEGEND" data-ar="كورا ليجيند">KORA LEGEND</h3>
                </div>
                <p class="footer-text" data-en="© 2024 Kora Legend. All rights reserved." data-ar="© 2024 كورا ليجيند. جميع الحقوق محفوظة.">© 2024 Kora Legend. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="football-api.js"></script>
    <script src="matches-data.js"></script>
    <script src="script.js"></script>
</body>
</html>
