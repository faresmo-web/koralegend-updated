<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Football Matches & Scores | Kora Legend</title>
    <meta name="description" content="Check live football scores, today's match schedule, and results from Premier League, La Liga, Egyptian League, and more on Kora Legend.">
    <meta property="og:title" content="Live Football Matches & Scores | Kora Legend">
    <meta property="og:description" content="Stay updated with live football scores and today's match schedule.">
    <link rel="canonical" href="https://koralegend.com/matches">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="styles_hd.css">
    <link rel="stylesheet" href="league-styles.css">
    <link rel="stylesheet" href="matches-style.css">
</head>
<body>
    <!-- Premium Preloader -->
    <div id="preloader">
        <div class="preloader-content">
            <div class="preloader-logo">
                <img src="logo.png" alt="Kora Legend">
            </div>
            <div class="preloader-spinner"></div>
            <div class="preloader-text" data-en="Kora Legend" data-ar="كورا ليجيند">Kora Legend</div>
        </div>
    </div>
    <!-- Header -->
    <header class="main-header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon"><img src="logo.png" alt="Kora Legend Logo"></div>
                    <h1 class="logo-text">KORA LEGEND <small style="font-size: 0.6rem; opacity: 0.7; display: block; margin-top: -5px;">BY ESSAM</small></h1>
                </div>
                
                <nav class="main-nav">
                    <ul>
                        <li><a href="index" class="nav-link" data-en="Home" data-ar="الرئيسية"><span class="nav-icon">🏠</span>Home</a></li>
                        <li><a href="matches" class="nav-link active" data-en="Matches" data-ar="المباريات"><span class="nav-icon">⚽</span>Matches</a></li>
                        <li><a href="news" class="nav-link" data-en="News" data-ar="الأخبار"><span class="nav-icon">📰</span>News</a></li>
                        <li><a href="legends" class="nav-link" data-en="Legends" data-ar="الأساطير"><span class="nav-icon">👑</span>Legends</a></li>
                        <li><a href="leagues" class="nav-link" data-en="Leagues" data-ar="البطولات"><span class="nav-icon">🏆</span>Leagues</a></li>
                    </ul>
                </nav>

                <button class="lang-toggle" id="langToggle">
                    <span class="lang-option" data-lang="en">EN</span>
                    <span class="lang-divider">|</span>
                    <span class="lang-option active" data-lang="ar">AR</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Yallakora-Style Matches Header -->
    <section class="yk-matches-header-section">
        <div class="container">
            <div class="yk-matches-header">
                <button class="yk-nav-arrow yk-nav-prev" id="datePrev">&#10094;</button>
                <div class="yk-title-group">
                    <h2 class="yk-matches-title" id="matchesDateTitle" data-en="Today's Matches" data-ar="مباريات اليوم">Today's Matches</h2>
                    <div class="view-toggle-container">
                        <button class="view-toggle-btn active" id="btnCustomView" data-en="Custom" data-ar="مخصص">Custom</button>
                        <button class="view-toggle-btn" id="btnLiveCenter" data-en="Live Center" data-ar="مباريات حية">Live Score</button>
                    </div>
                </div>
                <button class="yk-nav-arrow yk-nav-next" id="dateNext">&#10095;</button>
            </div>
            <div class="yk-filter-tabs">
                <button class="yk-filter-tab active" data-filter="all" data-en="All" data-ar="الكل">All</button>
                <button class="yk-filter-tab" data-filter="live" data-en="🔴 Live" data-ar="🔴 مباشر">🔴 Live</button>
                <button class="yk-filter-tab" data-filter="finished" data-en="Finished" data-ar="انتهت">Finished</button>
                <button class="yk-filter-tab" data-filter="upcoming" data-en="Upcoming" data-ar="لم تبدأ">Upcoming</button>
            </div>
            <div class="yk-league-filter-tabs" id="leagueFilterTabs">
                <button class="yk-league-tab active" data-league="all" data-en="All Leagues" data-ar="جميع البطولات">All Leagues</button>
                <button class="yk-league-tab" data-league="premier" data-en="Premier" data-ar="الإنجليزي">Premier</button>
                <button class="yk-league-tab" data-league="laliga" data-en="La Liga" data-ar="الإسباني">La Liga</button>
                <button class="yk-league-tab" data-league="seriea" data-en="Serie A" data-ar="الإيطالي">Serie A</button>
                <button class="yk-league-tab" data-league="bundesliga" data-en="Bundesliga" data-ar="الألماني">Bundesliga</button>
                <button class="yk-league-tab" data-league="ucl" data-en="UCL" data-ar="أبطال أوروبا">UCL</button>
                <button class="yk-league-tab" data-league="championship" data-en="Champ" data-ar="شامبيونشيب">Champ</button>
                <button class="yk-league-tab" data-league="portugal" data-en="Portugal" data-ar="البرتغالي">Portugal</button>
            </div>
        </div>
    </section>

    <!-- Matches Display -->
    <section class="matches-display">
        <div class="container">
            <div class="matches-list" id="matchesList">
                <!-- Matches will be populated by JavaScript -->
            </div>
            
            <!-- Custom Score View -->
            <div id="widgetContainer" class="widget-container" style="display: none;">
                <p style="text-align: center; padding: 2rem; color: var(--text-secondary);">Real-time feed is currently unavailable through the widget.</p>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="main-footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">
                    <div class="logo-icon"><img src="logo.png" alt="Kora Legend Logo"></div>
                    <h3 data-en="KORA LEGEND" data-ar="كورا ليجيند">KORA LEGEND</h3>
                </div>
                <p class="footer-text" data-en="© 2026 Kora Legend. Developed by Fares. All rights reserved." data-ar="© 2026 كورا ليجيند. تم التطوير بواسطة فارس. جميع الحقوق محفوظة.">© 2026 Kora Legend. Developed by Fares. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="football-api.js"></script>
    <script src="sockets-client.js"></script>
    <script src="match-detail.js"></script>
    <script src="matches-data.js"></script>
    <script src="script_hd.js"></script>
</body>
</html>
