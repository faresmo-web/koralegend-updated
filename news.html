<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latest Football News & Transfers | Kora Legend</title>
    <meta name="description" content="Get the latest football news, transfer updates, and match analysis from around the world on Kora Legend.">
    <meta property="og:title" content="Latest Football News & Transfers | Kora Legend">
    <meta property="og:description" content="Stay updated with the latest football news and transfer rumors.">
    <link rel="canonical" href="https://koralegend.com/news">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="styles_hd.css">
</head>
<body>
    <!-- Premium Preloader -->
    <div id="preloader">
        <div class="preloader-content">
            <div class="preloader-logo">
                <img src="logo.png" alt="Kora Legend">
            </div>
            <div class="preloader-spinner"></div>
            <div class="preloader-text" data-en="Kora Legend" data-ar="كورا ليجيند">Kora Legend</div>
        </div>
    </div>

    <!-- Header -->
    <header class="main-header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon"><img src="logo.png" alt="Kora Legend Logo"></div>
                    <h1 class="logo-text">KORA LEGEND <small style="font-size: 0.6rem; opacity: 0.7; display: block; margin-top: -5px;">BY ESSAM</small></h1>
                </div>
                
                
                <nav class="main-nav">
                    <ul>
                        <li><a href="index" class="nav-link" data-en="Home" data-ar="الرئيسية"><span class="nav-icon">🏠</span>Home</a></li>
                        <li><a href="matches" class="nav-link" data-en="Matches" data-ar="المباريات"><span class="nav-icon">⚽</span>Matches</a></li>
                        <li><a href="news" class="nav-link active" data-en="News" data-ar="الأخبار"><span class="nav-icon">📰</span>News</a></li>
                        <li><a href="legends" class="nav-link" data-en="Legends" data-ar="الأساطير"><span class="nav-icon">👑</span>Legends</a></li>
                        <li><a href="leagues" class="nav-link" data-en="Leagues" data-ar="البطولات"><span class="nav-icon">🏆</span>Leagues</a></li>
                    </ul>
                </nav>

                <button class="lang-toggle" id="langToggle">
                    <span class="lang-option" data-lang="en">EN</span>
                    <span class="lang-divider">|</span>
                    <span class="lang-option active" data-lang="ar">AR</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Page Header -->
    <section class="page-header">
        <div class="container">
            <h1 class="page-title" data-en="Football News" data-ar="أخبار كرة القدم">Football News</h1>
            <p class="page-subtitle" data-en="Latest updates from the world of football" data-ar="آخر التحديثات من عالم كرة القدم">Latest updates from the world of football</p>
        </div>
    </section>

    <!-- News Categories -->
    <section class="news-categories">
        <div class="container">
            <div class="category-tabs">
                <button class="category-tab active" data-category="all" data-en="All News" data-ar="جميع الأخبار">All News</button>
                <button class="category-tab" data-category="local" data-en="Local News" data-ar="أخبار محلية">Local News</button>
                <button class="category-tab" data-category="international" data-en="International" data-ar="أخبار دولية">International</button>
                <button class="category-tab" data-category="transfers" data-en="Transfers" data-ar="الانتقالات">Transfers</button>
            </div>
        </div>
    </section>

    <!-- News Grid -->
    <section class="news-content">
        <div class="container">
            <div class="news-grid-full" id="newsGrid">
                <!-- News will be populated by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="main-footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">
                    <div class="logo-icon"><img src="logo.png" alt="Kora Legend Logo"></div>
                    <h3 data-en="KORA LEGEND" data-ar="كورا ليجيند">KORA LEGEND</h3>
                </div>
                <p class="footer-text" data-en="© 2026 Kora Legend. Developed by Fares. All rights reserved." data-ar="© 2026 كورا ليجيند. تم التطوير بواسطة فارس. جميع الحقوق محفوظة.">© 2026 Kora Legend. Developed by Fares. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="football-api.js"></script>

    <script src="script_hd.js"></script>
    <script src="news-data.js"></script>
</body>
</html>
