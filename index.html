<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kora Legend - كورا ليجيند</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="league-styles.css">
</head>
<body>
    <!-- Header -->
    <header class="main-header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon"><img src="logo.png" alt="Kora Legend Logo"></div>
                    <h1 class="logo-text">KORA LEGEND</h1>
                </div>
                
                <nav class="main-nav">
                    <ul>
                        <li><a href="index" class="nav-link active" data-en="Home" data-ar="الرئيسية">Home</a></li>
                        <li><a href="matches" class="nav-link" data-en="Matches" data-ar="المباريات">Matches</a></li>
                        <li><a href="news" class="nav-link" data-en="News" data-ar="الأخبار">News</a></li>
                        <li><a href="legends" class="nav-link" data-en="Legends" data-ar="الأساطير">Legends</a></li>
                        <li><a href="leagues" class="nav-link" data-en="Leagues" data-ar="البطولات">Leagues</a></li>
                    </ul>
                </nav>
                
                <button class="lang-toggle" id="langToggle">
                    <span class="lang-option" data-lang="en">EN</span>
                    <span class="lang-divider">|</span>
                    <span class="lang-option active" data-lang="ar">AR</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero-section">
        <div class="hero-bg"></div>
        <div class="container">
            <div class="hero-content">
                <h2 class="hero-title" data-en="Live The Passion" data-ar="عش الشغف">Live The Passion</h2>
                <p class="hero-subtitle" data-en="Your Ultimate Football Destination" data-ar="وجهتك النهائية لكرة القدم">Your Ultimate Football Destination</p>
            </div>
        </div>
    </section>

    <!-- Today's Results -->
    <section class="results-section">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title" data-en="Today's Results" data-ar="نتائج اليوم">Today's Results</h2>
                <div class="section-line"></div>
            </div>
            
            <div class="results-grid" id="todayResults">
                <!-- Results will be populated by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Upcoming Matches -->
    <section class="matches-section">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title" data-en="Upcoming Matches" data-ar="المباريات القادمة">Upcoming Matches</h2>
                <div class="section-line"></div>
            </div>
            
            <div class="matches-grid" id="upcomingMatches">
                <!-- Matches will be populated by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Breaking News -->
    <section class="news-section">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title" data-en="Breaking News" data-ar="أخبار عاجلة">Breaking News</h2>
                <div class="section-line"></div>
            </div>
            
            <div class="news-grid" id="breakingNews">
                <!-- News will be populated by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="main-footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">
                    <div class="logo-icon"><img src="logo.png" alt="Kora Legend Logo"></div>
                    <h3 data-en="KORA LEGEND" data-ar="كورا ليجيند">KORA LEGEND</h3>
                </div>
                <p class="footer-text" data-en="© 2024 Kora Legend. All rights reserved." data-ar="© 2024 كورا ليجيند. جميع الحقوق محفوظة.">© 2024 Kora Legend. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="football-api.js"></script>
    <script src="script.js"></script>
</body>
</html>
