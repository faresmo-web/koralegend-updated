<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kora Legend - كورا ليجيند</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="styles_hd.css">
</head>
<body>
    <!-- Premium Preloader -->
    <div id="preloader">
        <div class="preloader-content">
            <div class="preloader-logo">
                <img src="logo.png" alt="Kora Legend">
            </div>
            <div class="preloader-spinner"></div>
            <div class="preloader-text" data-en="Kora Legend" data-ar="كورا ليجيند">Kora Legend</div>
        </div>
    </div>

    <!-- Header -->
    <header class="main-header">
        <div class="container">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon"><img src="logo.png" alt="Kora Legend Logo"></div>
                    <h1 class="logo-text">KORA LEGEND <small style="font-size: 0.6rem; opacity: 0.7; display: block; margin-top: -5px;">BY ESSAM</small></h1>
                </div>
                
                <nav class="main-nav">
                    <ul>
                        <li><a href="index" class="nav-link" data-en="Home" data-ar="الرئيسية"><span class="nav-icon">🏠</span>Home</a></li>
                        <li><a href="matches" class="nav-link" data-en="Matches" data-ar="المباريات"><span class="nav-icon">⚽</span>Matches</a></li>
                        <li><a href="news" class="nav-link" data-en="News" data-ar="الأخبار"><span class="nav-icon">📰</span>News</a></li>
                        <li><a href="legends" class="nav-link active" data-en="Legends" data-ar="الأساطير"><span class="nav-icon">👑</span>Legends</a></li>
                        <li><a href="leagues" class="nav-link" data-en="Leagues" data-ar="البطولات"><span class="nav-icon">🏆</span>Leagues</a></li>
                    </ul>
                </nav>

                <button class="lang-toggle" id="langToggle">
                    <span class="lang-option" data-lang="en">EN</span>
                    <span class="lang-divider">|</span>
                    <span class="lang-option active" data-lang="ar">AR</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Page Header -->
    <section class="page-header">
        <div class="container">
            <h1 class="page-title" data-en="Football Legends" data-ar="أساطير كرة القدم">Football Legends</h1>
            <p class="page-subtitle" data-en="Celebrating the greatest players of all time" data-ar="احتفال بأعظم اللاعبين على مر العصور">Celebrating the greatest players of all time</p>
        </div>
    </section>

    <!-- Legends Categories -->
    <section class="legends-categories">
        <div class="container">
            <div class="category-tabs">
                <button class="category-tab active" data-category="all" data-en="All Legends" data-ar="جميع الأساطير">All Legends</button>
                <button class="category-tab" data-category="egypt-arab" data-en="Egypt & Arab" data-ar="مصر والعرب">Egypt & Arab</button>
                <button class="category-tab" data-category="international" data-en="International" data-ar="أساطير دولية">International</button>
            </div>
        </div>
    </section>

    <!-- Legends Grid -->
    <section class="legends-content">
        <div class="container">
            <div class="legends-grid" id="legendsGrid">
                <!-- Legends will be populated by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="main-footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">
                    <div class="logo-icon"><img src="logo.png" alt="Kora Legend Logo"></div>
                    <h3 data-en="KORA LEGEND" data-ar="كورا ليجيند">KORA LEGEND</h3>
                </div>
                <p class="footer-text" data-en="© 2026 Kora Legend. Developed by Fares. All rights reserved." data-ar="© 2026 كورا ليجيند. تم التطوير بواسطة فارس. جميع الحقوق محفوظة.">© 2026 Kora Legend. Developed by Fares. All rights reserved.</p>
            </div>
        </div>
    </footer>


    <script src="script_hd.js"></script>
    <script src="legends_hd.js"></script>
</body>
</html>
